<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MetaScan Options</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; }
    h1 { font-size: 18px; margin-bottom: 16px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #6b7280; margin-bottom: 4px; }
    input[type="text"] { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; margin-bottom: 8px; }
    button { padding: 8px 16px; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .status { margin-top: 8px; font-size: 12px; }
    .status.success { color: #059669; }
    .status.error { color: #ef4444; }
    .setting { margin: 12px 0; }
  </style>
</head>
<body>
  <h1>MetaScan Settings</h1>
  <div class="setting">
    <label for="license-key">License Key</label>
    <input type="text" id="license-key" placeholder="PRO-XXXX-XXXX">
    <button id="activate">Activate</button>
    <p id="status" class="status"></p>
  </div>
  <div class="setting">
    <label>Auto-scan on page load <input type="checkbox" id="autoscan" checked></label>
  </div>
  <div class="setting">
    <label>Show issue badge count <input type="checkbox" id="badge" checked></label>
  </div>
  <script>
    document.getElementById('activate').addEventListener('click', async () => {
      const key = document.getElementById('license-key').value.trim();
      const resp = await chrome.runtime.sendMessage({ action: 'setLicense', payload: { key } });
      const status = document.getElementById('status');
      if (resp.valid) {
        status.textContent = 'Activated as ' + resp.tier;
        status.className = 'status success';
      } else {
        status.textContent = 'Invalid key format';
        status.className = 'status error';
      }
    });
    chrome.storage.local.get(['ms_autoscan', 'ms_badge'], data => {
      document.getElementById('autoscan').checked = data.ms_autoscan !== false;
      document.getElementById('badge').checked = data.ms_badge !== false;
    });
    document.getElementById('autoscan').addEventListener('change', e => chrome.storage.local.set({ ms_autoscan: e.target.checked }));
    document.getElementById('badge').addEventListener('change', e => chrome.storage.local.set({ ms_badge: e.target.checked }));
  </script>
</body>
</html>
